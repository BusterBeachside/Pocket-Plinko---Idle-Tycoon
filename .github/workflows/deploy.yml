name: Build for Itch.io

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # Updated from v4 to v6 to support Node 24 runtime
        uses: actions/checkout@v6
      
      - name: Setup Node
        # Updated from v4 to v6 to support Node 24 runtime
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          
      - name: Install dependencies
        run: npm install
        
      - name: Build
        run: npm run build
        
      - name: Upload Artifact
        # Updated from v4 to v6 to support Node 24 runtime
        uses: actions/upload-artifact@v6
        with:
          name: pocket-plinko-build
          path: dist/
          retention-days: 5
